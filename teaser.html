<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTVScore Teaser</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:'Bebas Neue',sans-serif; }
#container { width:min(100vw,calc(100vh * 9/16)); height:min(100vh,calc(100vw * 16/9)); background:#000; position:relative; overflow:hidden; }
.scene { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:10%; opacity:0; transition:opacity 0.8s ease; pointer-events:none; }
.scene.active { opacity:1; }
.particle { position:absolute; width:2px; height:2px; background:rgba(243,156,18,.5); border-radius:50%; pointer-events:none; }
.txt-main { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,8vw,4rem); color:#fff; letter-spacing:4px; line-height:1.1; }
.txt-muted { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.8rem,7vw,3.5rem); color:rgba(255,255,255,.45); letter-spacing:4px; }
.txt-accent { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,6vw,3rem); color:#f39c12; letter-spacing:6px; }
.txt-blue { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.2rem,5vw,2.5rem); color:#74b9ff; letter-spacing:8px; margin-top:16px; }
.txt-small { font-family:'Barlow Condensed',sans-serif; font-size:clamp(0.75rem,2.5vw,1rem); color:rgba(255,255,255,.35); letter-spacing:6px; text-transform:uppercase; margin-top:12px; }
.logo-img { width:75%; max-width:320px; animation:logoPulse 2s infinite; }
@keyframes logoPulse { 0%,100%{filter:drop-shadow(0 0 30px rgba(243,156,18,.5))} 50%{filter:drop-shadow(0 0 60px rgba(116,185,255,.6))} }
.line { width:60%; height:1px; background:linear-gradient(90deg,transparent,rgba(243,156,18,.6),transparent); margin:16px auto; }
#flash { position:absolute; inset:0; background:#fff; opacity:0; z-index:50; pointer-events:none; transition:opacity 0.05s; }
#play-overlay { position:absolute; inset:0; z-index:100; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer; gap:20px; }
.play-logo { width:60%; max-width:250px; filter:drop-shadow(0 0 20px rgba(243,156,18,.4)); }
.play-btn { width:70px; height:70px; border:2px solid #f39c12; border-radius:50%; display:flex; align-items:center; justify-content:center; animation:playPulse 1.5s infinite; }
@keyframes playPulse { 0%,100%{box-shadow:0 0 0 0 rgba(243,156,18,.5)} 50%{box-shadow:0 0 0 12px rgba(243,156,18,0)} }
.play-label { font-family:'Bebas Neue',sans-serif; color:#f39c12; letter-spacing:4px; font-size:1rem; }
#progress { position:absolute; bottom:0; left:0; height:3px; background:linear-gradient(90deg,#f39c12,#74b9ff); width:0%; z-index:10; }
</style>
</head>

<script>
const TOTAL = 26000;
const scenes = [
  {id:'s0',t:0},{id:'s1',t:1500},{id:'s2',t:4500},{id:'s3',t:6000},
  {id:'s4',t:8000},{id:'s5',t:10000},{id:'s6',t:12000},{id:'s7',t:13500},
  {id:'s8',t:16000},{id:'s9',t:20000},{id:'s10',t:23000}
];
function showScene(id) {
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function flash() {
  const f=document.getElementById('flash');
  f.style.opacity='0.9';
  setTimeout(()=>f.style.opacity='0',150);
}
function spawnParticles() {
  const c=document.getElementById('particles');
  c.innerHTML='';
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.top=Math.random()*100+'%';
    const dur=4000+Math.random()*6000;
    p.animate([{transform:'translateY(0) scale(1)',opacity:0.4},{transform:'translateY(-'+(50+Math.random()*100)+'px) scale(0)',opacity:0}],{duration:dur,iterations:Infinity,delay:Math.random()*3000});
    c.appendChild(p);
  }
}
let ctx;
function makeSound(time,freq,vol,dur){
  const osc=ctx.createOscillator();
  const g=ctx.createGain();
  osc.type='sine';
  osc.frequency.value=freq;
  g.gain.setValueAtTime(0,time);
  g.gain.linearRampToValueAtTime(vol,time+dur*0.3);
  g.gain.linearRampToValueAtTime(0,time+dur);
  osc.connect(g);g.connect(ctx.destination);
  osc.start(time);osc.stop(time+dur);
}
function start(){
  document.getElementById('play-overlay').style.display='none';
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  const now=ctx.currentTime;
  makeSound(now+0,40,0.08,6);makeSound(now+6,55,0.06,5);
  makeSound(now+12,45,0.05,4);makeSound(now+16,80,0.12,2);
  makeSound(now+16.1,120,0.08,1.5);makeSound(now+20,60,0.07,6);
  spawnParticles();
  const startTime=Date.now();
  scenes.forEach(sc=>{
    setTimeout(()=>{
      showScene(sc.id);
      if(sc.id==='s8')flash();
    },sc.t);
  });
  const prog=document.getElementById('progress');
  const tick=setInterval(()=>{
    const pct=Math.min(100,(Date.now()-startTime)/TOTAL*100);
    prog.style.width=pct+'%';
    if(pct>=100)clearInterval(tick);
  },100);
}
</script>
